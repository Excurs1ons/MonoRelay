<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrismaAPIRelay 管理面板</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --bg-card: #1a1d27;
  --bg-input: #252836;
  --border: #2e3244;
  --text: #e4e6f0;
  --text-dim: #8b8fa3;
  --accent: #6c5ce7;
  --accent-hover: #7c6ff7;
  --green: #00b894;
  --red: #e74c3c;
  --yellow: #fdcb6e;
  --orange: #e17055;
  --radius: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.header h1 { font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
.header h1 span { color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 12px; }
.status-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--green); display: inline-block;
  box-shadow: 0 0 6px var(--green);
}
.status-dot.offline { background: var(--red); box-shadow: 0 0 6px var(--red); }
.status-text { font-size: 13px; color: var(--text-dim); }

.auth-bar {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg-card); padding: 12px 16px;
  border-radius: var(--radius); margin-bottom: 20px;
  border: 1px solid var(--border);
}
.auth-bar label { font-size: 13px; color: var(--text-dim); white-space: nowrap; }
.auth-bar input {
  flex: 1; background: var(--bg-input); border: 1px solid var(--border);
  color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 13px;
  font-family: 'SF Mono', 'Fira Code', monospace;
}
.auth-bar input:focus { outline: none; border-color: var(--accent); }
.auth-bar .hint { font-size: 11px; color: var(--text-dim); }

.tabs {
  display: flex; gap: 4px; margin-bottom: 20px;
  background: var(--bg-card); padding: 4px; border-radius: var(--radius);
  border: 1px solid var(--border);
}
.tab {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 18px; border-radius: 8px; cursor: pointer;
  font-size: 13px; font-weight: 500; color: var(--text-dim);
  transition: all 0.15s;
}
.tab:hover { color: var(--text); background: var(--bg-input); }
.tab.active { background: var(--accent); color: #fff; }
.tab i { width: 16px; height: 16px; }

.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
}
.card-title {
  font-size: 14px; font-weight: 600; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.card-title i { width: 18px; height: 18px; color: var(--accent); }

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
}
.stat-label { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.stat-label i { width: 14px; height: 14px; }
.stat-value { font-size: 24px; font-weight: 700; }
.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }
.stat-value.yellow { color: var(--yellow); }
.stat-value.accent { color: var(--accent); }

.provider-list { display: flex; flex-direction: column; gap: 10px; }
.provider-item {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg-input); padding: 12px 16px; border-radius: 8px;
}
.provider-info { display: flex; align-items: center; gap: 10px; }
.provider-name { font-weight: 600; font-size: 14px; }
.provider-url { font-size: 12px; color: var(--text-dim); font-family: 'SF Mono', 'Fira Code', monospace; }
.provider-keys { font-size: 12px; color: var(--text-dim); }
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 600;
}
.badge-green { background: rgba(0,184,148,0.15); color: var(--green); }
.badge-red { background: rgba(231,76,60,0.15); color: var(--red); }
.badge-yellow { background: rgba(253,203,110,0.15); color: var(--yellow); }

.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 14px; border-radius: 6px; border: none;
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: all 0.15s;
}
.btn i { width: 14px; height: 14px; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-sm { padding: 5px 10px; font-size: 11px; }
.btn-ghost {
  background: transparent; color: var(--text-dim);
  border: 1px solid var(--border);
}
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  text-align: left; padding: 10px 12px; color: var(--text-dim);
  font-weight: 600; font-size: 11px; text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tr:last-child td { border-bottom: none; }
.mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }

.config-editor {
  width: 100%; min-height: 400px; background: var(--bg-input);
  border: 1px solid var(--border); color: var(--text);
  padding: 16px; border-radius: 8px; font-size: 13px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  resize: vertical; line-height: 1.6;
}
.config-editor:focus { outline: none; border-color: var(--accent); }

.router-section { margin-bottom: 16px; }
.router-section h3 { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
.alias-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.alias-item {
  display: flex; justify-content: space-between;
  background: var(--bg-input); padding: 8px 12px; border-radius: 6px;
  font-size: 12px;
}
.alias-key { color: var(--accent); font-weight: 600; }
.alias-val { color: var(--text-dim); font-family: 'SF Mono', 'Fira Code', monospace; }

.loading { text-align: center; padding: 40px; color: var(--text-dim); }
.spinner {
  width: 24px; height: 24px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty { text-align: center; padding: 30px; color: var(--text-dim); font-size: 13px; }

.toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--bg-card); border: 1px solid var(--border);
  padding: 12px 20px; border-radius: 8px; font-size: 13px;
  z-index: 1000; animation: slideUp 0.3s ease;
}
.toast.success { border-color: var(--green); }
.toast.error { border-color: var(--red); }
@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } }

@media (max-width: 768px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .alias-grid { grid-template-columns: 1fr; }
  .provider-item { flex-direction: column; align-items: flex-start; gap: 8px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><span>Prisma</span>APIRelay</h1>
    <div class="header-right">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">连接中...</span>
    </div>
  </div>

  <div class="auth-bar">
    <i data-lucide="key" style="width:16px;height:16px;color:var(--text-dim)"></i>
    <label>访问密钥</label>
    <input type="password" id="apiKey" placeholder="请输入访问密钥...">
    <button class="btn btn-primary" onclick="saveKey()"><i data-lucide="save"></i>保存</button>
    <span class="hint">存储在浏览器本地</span>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="overview" onclick="switchTab('overview')"><i data-lucide="layout-dashboard"></i>概览</div>
    <div class="tab" data-tab="providers" onclick="switchTab('providers')"><i data-lucide="plug"></i>提供商</div>
    <div class="tab" data-tab="logs" onclick="switchTab('logs')"><i data-lucide="scroll-text"></i>日志</div>
    <div class="tab" data-tab="router" onclick="switchTab('router')"><i data-lucide="route"></i>路由</div>
    <div class="tab" data-tab="config" onclick="switchTab('config')"><i data-lucide="settings"></i>配置</div>
  </div>

  <div id="tab-overview">
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-label"><i data-lucide="arrow-up-right"></i>总请求数</div><div class="stat-value accent" id="statTotal">0</div></div>
      <div class="stat-card"><div class="stat-label"><i data-lucide="alert-triangle"></i>错误率</div><div class="stat-value red" id="statErrorRate">0%</div></div>
      <div class="stat-card"><div class="stat-label"><i data-lucide="coins"></i>总 Token 数</div><div class="stat-value" id="statTokens">0</div></div>
      <div class="stat-card"><div class="stat-label"><i data-lucide="dollar-sign"></i>预估费用</div><div class="stat-value green" id="statCost">$0</div></div>
      <div class="stat-card"><div class="stat-label"><i data-lucide="clock"></i>平均延迟</div><div class="stat-value yellow" id="statLatency">0ms</div></div>
      <div class="stat-card"><div class="stat-label"><i data-lucide="shield-check"></i>可用密钥</div><div class="stat-value" id="statKeys">0</div></div>
    </div>

    <div class="card">
      <div class="card-title"><i data-lucide="bar-chart-3"></i> 各提供商请求分布</div>
      <div id="providerBreakdown" class="empty">暂无数据</div>
    </div>

    <div class="card">
      <div class="card-title"><i data-lucide="activity"></i> 最近活动</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>时间</th><th>模型</th><th>提供商</th><th>状态</th><th>延迟</th></tr></thead>
          <tbody id="recentTable"><tr><td colspan="5" class="empty">暂无请求</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="tab-providers" style="display:none">
    <div class="card">
      <div class="card-title"><i data-lucide="server"></i> 提供商状态</div>
      <div class="provider-list" id="providerList"></div>
    </div>
    <div class="card">
      <div class="card-title"><i data-lucide="key-round"></i> 密钥状态</div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>提供商</th><th>标签</th><th>请求数</th><th>失败数</th><th>状态</th></tr></thead>
          <tbody id="keyTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="tab-logs" style="display:none">
    <div class="card">
      <div class="card-title">
        <i data-lucide="file-text"></i> 请求日志
        <div style="margin-left:auto"><button class="btn btn-ghost btn-sm" onclick="loadLogs()"><i data-lucide="refresh-cw"></i>刷新</button></div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>时间</th><th>模型</th><th>提供商</th><th>密钥</th><th>状态</th><th>延迟</th><th>Token</th><th>费用</th><th>错误</th></tr></thead>
          <tbody id="logsTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="tab-router" style="display:none">
    <div class="card">
      <div class="card-title"><i data-lucide="git-branch"></i> 路由配置</div>
      <div id="routerInfo"></div>
    </div>
  </div>

  <div id="tab-config" style="display:none">
    <div class="card">
      <div class="card-title">
        <i data-lucide="sliders-horizontal"></i> 配置文件
        <div style="margin-left:auto;display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="loadConfig()"><i data-lucide="rotate-ccw"></i>重新加载</button>
          <button class="btn btn-primary btn-sm" onclick="saveConfig()"><i data-lucide="check"></i>保存并应用</button>
        </div>
      </div>
      <textarea class="config-editor" id="configEditor"></textarea>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let currentTab = 'overview';
let refreshTimer = null;

function getHeaders() {
  const key = document.getElementById('apiKey').value;
  return { 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json' };
}

function saveKey() {
  localStorage.setItem('prisma_key', document.getElementById('apiKey').value);
  toast('访问密钥已保存', 'success');
  refreshAll();
}

function toast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  ['overview','providers','logs','router','config'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? '' : 'none';
  });
  lucide.createIcons();
  if (tab === 'overview') refreshAll();
  if (tab === 'providers') loadProviders();
  if (tab === 'logs') loadLogs();
  if (tab === 'router') loadRouter();
  if (tab === 'config') loadConfig();
}

async function api(url) {
  const r = await fetch(API + url, { headers: getHeaders() });
  if (r.status === 401) {
    document.getElementById('statusDot').classList.add('offline');
    document.getElementById('statusText').textContent = '未授权';
    return null;
  }
  return r.json();
}

async function apiPost(url, body) {
  const r = await fetch(API + url, {
    method: 'POST',
    headers: getHeaders(),
    body: JSON.stringify(body),
  });
  return r.json();
}

async function apiPut(url, body) {
  const r = await fetch(API + url, {
    method: 'PUT',
    headers: getHeaders(),
    body: JSON.stringify(body),
  });
  return r.json();
}

function fmtTime(ts) {
  if (!ts) return '-';
  const d = new Date(ts * 1000);
  return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function fmtTokens(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return n.toString();
}

function statusBadge(code) {
  if (!code) return '<span class="badge badge-yellow">-</span>';
  if (code < 400) return '<span class="badge badge-green">' + code + '</span>';
  return '<span class="badge badge-red">' + code + '</span>';
}

async function refreshAll() {
  const data = await api('/api/stats');
  if (!data) return;

  document.getElementById('statusDot').classList.remove('offline');
  document.getElementById('statusText').textContent = '已连接';

  const s = data.in_memory || {};
  const db = data.persistent || {};

  document.getElementById('statTotal').textContent = (db.total_requests || s.total_requests || 0).toLocaleString();
  document.getElementById('statErrorRate').textContent = ((s.error_rate || 0) * 100).toFixed(1) + '%';
  document.getElementById('statTokens').textContent = fmtTokens((s.total_tokens_in || 0) + (s.total_tokens_out || 0));
  document.getElementById('statCost').textContent = '$' + (s.estimated_total_cost || 0).toFixed(4);
  document.getElementById('statLatency').textContent = Math.round(db.avg_latency_ms || 0) + 'ms';

  let totalKeys = 0, availKeys = 0;
  if (data.keys) {
    Object.values(data.keys).forEach(p => {
      totalKeys += p.total_keys || 0;
      availKeys += p.available || 0;
    });
  }
  document.getElementById('statKeys').textContent = availKeys + '/' + totalKeys;

  const breakdown = document.getElementById('providerBreakdown');
  const byProvider = s.requests_by_provider || {};
  const keys = Object.keys(byProvider);
  if (keys.length) {
    breakdown.innerHTML = '<div class="provider-list">' + keys.map(k => {
      const pct = Math.round((byProvider[k] / s.total_requests) * 100);
      return '<div class="provider-item"><div class="provider-info"><span class="provider-name">' + k + '</span></div><span class="mono">' + byProvider[k].toLocaleString() + ' (' + pct + '%)</span></div>';
    }).join('') + '</div>';
  } else {
    breakdown.innerHTML = '<div class="empty">暂无数据</div>';
  }

  const logs = await api('/api/logs?limit=10');
  const tbody = document.getElementById('recentTable');
  if (logs && logs.length) {
    tbody.innerHTML = logs.map(l =>
      '<tr><td class="mono">' + fmtTime(l.timestamp) + '</td><td class="mono">' + (l.model || '-') + '</td><td>' + (l.provider || '-') + '</td><td>' + statusBadge(l.status_code) + '</td><td class="mono">' + (l.latency_ms ? Math.round(l.latency_ms) + 'ms' : '-') + '</td></tr>'
    ).join('');
  } else {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">暂无请求</td></tr>';
  }

  lucide.createIcons();
}

async function loadProviders() {
  const [providers, stats] = await Promise.all([
    api('/api/providers'),
    api('/api/stats'),
  ]);
  if (!providers) return;

  const list = document.getElementById('providerList');
  list.innerHTML = Object.entries(providers).map(([name, p]) => {
    const typeLabel = p.provider_type === 'web_reverse' ? '网页反代' : 'API';
    const typeBadge = p.provider_type === 'web_reverse' ? 'badge-yellow' : 'badge-green';
    const urlText = p.provider_type === 'web_reverse' ? (p.web_reverse?.chatgpt_base_url || 'chatgpt.com') : p.base_url;
    return '<div class="provider-item"><div class="provider-info"><span class="badge ' + (p.enabled ? 'badge-green' : 'badge-red') + '">' + (p.enabled ? '已启用' : '已禁用') + '</span><span class="badge ' + typeBadge + '">' + typeLabel + '</span><div><div class="provider-name">' + name + '</div><div class="provider-url">' + urlText + '</div></div></div><div style="display:flex;align-items:center;gap:10px"><span class="provider-keys">' + p.keys.length + ' 个密钥</span><button class="btn btn-ghost btn-sm" onclick="testProvider(\'' + name + '\')"><i data-lucide="zap"></i>测试</button></div></div>';
  }).join('');

  const keyTable = document.getElementById('keyTable');
  const keys = stats && stats.keys ? stats.keys : {};
  let rows = [];
  Object.entries(keys).forEach(([prov, data]) => {
    (data.keys || []).forEach(k => {
      rows.push('<tr><td>' + prov + '</td><td class="mono">' + k.label + '</td><td>' + (k.total_requests || 0) + '</td><td>' + (k.total_failures || 0) + '</td><td><span class="badge ' + (k.available ? 'badge-green' : 'badge-red') + '">' + (k.available ? '可用' : '冷却中') + '</span></td></tr>');
    });
  });
  keyTable.innerHTML = rows.length ? rows.join('') : '<tr><td colspan="5" class="empty">暂无密钥数据</td></tr>';

  lucide.createIcons();
}

async function testProvider(name) {
  const r = await apiPost('/api/providers/' + name + '/test', {});
  toast(name + ': ' + (r.message || r.status), r.status === 'ok' ? 'success' : 'error');
  loadProviders();
}

async function loadLogs() {
  const logs = await api('/api/logs?limit=100');
  const tbody = document.getElementById('logsTable');
  if (logs && logs.length) {
    tbody.innerHTML = logs.map(l =>
      '<tr><td class="mono">' + fmtTime(l.timestamp) + '</td><td class="mono">' + (l.model || '-') + '</td><td>' + (l.provider || '-') + '</td><td class="mono">' + (l.key_label || '-') + '</td><td>' + statusBadge(l.status_code) + '</td><td class="mono">' + (l.latency_ms ? Math.round(l.latency_ms) + 'ms' : '-') + '</td><td class="mono">' + ((l.input_tokens || 0) + (l.output_tokens || 0) || '-') + '</td><td class="mono">' + (l.estimated_cost ? '$' + l.estimated_cost.toFixed(4) : '-') + '</td><td style="max-width:150px;overflow:hidden;text-overflow:ellipsis" title="' + (l.error_message || '') + '">' + (l.error_message || '-') + '</td></tr>'
    ).join('');
  } else {
    tbody.innerHTML = '<tr><td colspan="9" class="empty">暂无日志</td></tr>';
  }
}

async function loadRouter() {
  const info = await api('/api/router');
  if (!info) return;
  const el = document.getElementById('routerInfo');
  let html = '';

  html += '<div class="router-section"><h3>模式</h3><span class="badge badge-green">' + (info.mode || 'passthrough') + '</span></div>';

  const aliases = info.aliases || {};
  if (Object.keys(aliases).length) {
    html += '<div class="router-section"><h3>别名</h3><div class="alias-grid">' +
      Object.entries(aliases).map(([k, v]) => '<div class="alias-item"><span class="alias-key">' + k + '</span><span class="alias-val">' + v + '</span></div>').join('') +
      '</div></div>';
  }

  const mapping = info.provider_mapping || {};
  if (Object.keys(mapping).length) {
    html += '<div class="router-section"><h3>提供商映射</h3><div class="alias-grid">' +
      Object.entries(mapping).map(([k, v]) => '<div class="alias-item"><span class="alias-key">' + k + '</span><span class="alias-val">' + v + '</span></div>').join('') +
      '</div></div>';
  }

  const overrides = info.model_overrides || {};
  if (Object.keys(overrides).length) {
    html += '<div class="router-section"><h3>模型覆盖</h3><div class="alias-grid">' +
      Object.entries(overrides).map(([k, v]) => '<div class="alias-item"><span class="alias-key">' + k + '</span><span class="alias-val">' + v + '</span></div>').join('') +
      '</div></div>';
  }

  el.innerHTML = html || '<div class="empty">未配置路由规则</div>';
}

async function loadConfig() {
  const cfg = await api('/api/config');
  if (cfg) {
    document.getElementById('configEditor').value = JSON.stringify(cfg, null, 2);
  }
}

async function saveConfig() {
  try {
    const cfg = JSON.parse(document.getElementById('configEditor').value);
    const r = await apiPut('/api/config', cfg);
    toast(r.message || '配置已保存', r.status === 'ok' ? 'success' : 'error');
  } catch (e) {
    toast('JSON 格式无效: ' + e.message, 'error');
  }
}

async function init() {
  lucide.createIcons();

  const savedKey = localStorage.getItem('prisma_key');
  if (savedKey) document.getElementById('apiKey').value = savedKey;

  document.getElementById('apiKey').addEventListener('keydown', e => {
    if (e.key === 'Enter') { saveKey(); }
  });

  if (savedKey) {
    await refreshAll();
    refreshTimer = setInterval(refreshAll, 10000);
  }
}

init();
</script>
